<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Les Biscuits de Papa Ours</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

    <style>
body{
    font-family: 'Fredoka', sans-serif;
    background:#f5f1ea;
    margin:0;
    padding:40px;
    text-align:center;
    cursor:url("images/cookie-cursor2.png"), auto;
}

h1{
    color:#5c3b1e;
}

.galerie{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    margin-top:40px;
}

.galerie img{
    width:300px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
    transition: transform 0.3s ease;
}

.photo img{
    transition: transform 0.3s ease;
}

.photo:hover{
    transform: scale(1.30);
    z-index:10;
}

.photo{
    position:relative;
    border-radius:15px;
    cursor:url("images/cookie-cursor2.png"), auto;
    transition: transform 0.4s ease;
}

.legende{
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    background:rgba(0,0,0,0.7);
    color:white;
    padding:10px;
    opacity:0;
    transition:opacity 0.3s ease;
    font-size:18px;
}

.photo:hover .legende{
    opacity:1;
}

.album summary{
    list-style:none;
    position:relative;
}

.album summary::-webkit-details-marker{
    display:none;
}

.album summary img{
    width:300px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.album-photos{
    display:none;
    position:absolute;
    top:105%;
    left:50%;
    transform:translateX(-50%);
    background:#fff8ee;
    padding:15px;
    border-radius:15px;
    box-shadow:0 8px 25px rgba(0,0,0,0.25);
    gap:12px;
    z-index:50;
    flex-wrap:wrap;
    justify-content:center;
}

.album:hover .album-photos,
.album[open] .album-photos{
    display:flex;
}
      
.album{
    position:relative;
    border-radius:15px;
    cursor:url("images/cookie-cursor2.png"), auto;
    transition: transform 0.4s ease;
}

.album:hover{
    transform: scale(1.10);
    z-index:20;
}

.album .legende{
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    background:rgba(0,0,0,0.7);
    color:white;
    padding:10px;
    opacity:1;
    font-size:18px;
    border-radius:0 0 15px 15px;
}
  .album-photos img{
    width:180px;
    border-radius:12px;
}     
</style>
</head>

<body>

<h1>🍪 Les Biscuits de Papa Ours 🐻</h1>

<p>Bienvenue dans ma biscuiterie artisanale.</p>

<div class="galerie">

    <div class="photo">
        <img src="images/IMG_0009.JPEG">
        <div class="legende">Cookie Chocolat Fleur de Sel</div>
    </div>

    <div class="photo">
        <img src="images/IMG_0010.JPEG">
        <div class="legende">Cookie Spéculoos</div>
    </div>

    <div class="photo">
        <img src="images/IMG_0011.JPEG">
        <div class="legende">Muffin Praliné Noisette</div>
    </div>
 <details class="album">
    <summary>
        <img src="images/IMG_0009.JPEG" alt="Cookies">
        <span class="legende">Cookies — voir plus</span>
    </summary>

    <div class="album-photos">
        <img src="images/IMG_0009.JPEG">
        <img src="images/IMG_0010.JPEG">
        <img src="images/IMG_0011.JPEG">
    </div>
</details>
</div>

   
    

</body>
</html>
