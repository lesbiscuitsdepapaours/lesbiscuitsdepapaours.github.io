<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Les Biscuits de Papa Ours</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

    <style>
body{
    font-family: 'Fredoka', sans-serif;
    background:#f5f1ea;
    margin:0;
    padding:40px;
    text-align:center;
    overflow-x:hidden;
    cursor:url("images/cookie-cursor2.png"), auto;
}

h1{
    color:#5c3b1e;
}

.galerie{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    margin-top:40px;
}

.galerie img{
    width:300px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
    transition: transform 0.3s ease;
}

.photo img{
    transition: transform 0.3s ease;
}

.photo:hover,
.photo:active{
    transform: scale(1.30);
    z-index:10;
}

.photo{
    position:relative;
    border-radius:15px;
    cursor:url("images/cookie-cursor2.png"), auto;
    transition: transform 0.4s ease;
}

.legende{
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    background:rgba(0,0,0,0.7);
    color:white;
    padding:10px;
    opacity:0;
    transition:opacity 0.3s ease;
    font-size:18px;
}

.photo:hover .legende{
    opacity:1;
}

.album summary{
    list-style:none;
    position:relative;
}

.album summary::-webkit-details-marker{
    display:none;
}

.album summary img{
    width:300px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.album-photos{
    display:none;
    position:absolute;
    top:105%;
    left:50%;
    transform:translateX(-50%);
    background:#fff8ee;
    padding:15px;
    border-radius:15px;
    box-shadow:0 8px 25px rgba(0,0,0,0.25);
    gap:12px;
    z-index:50;
    flex-wrap:wrap;
    justify-content:center;
}

.album:hover .album-photos,
.album[open] .album-photos{
    display:flex;
}
      
.album{
    position:relative;
    border-radius:15px;
    cursor:url("images/cookie-cursor2.png"), auto;
    transition: transform 0.4s ease;
}

.album:hover,
.album:active{
    transform: scale(1.10);
    z-index:20;
}

.album .legende{
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    background:rgba(0,0,0,0.7);
    color:white;
    padding:10px;
    opacity:0;
    transition:opacity 0.3s ease;
    font-size:18px;
    border-radius:0 0 15px 15px;
}

.album:hover .legende{
    opacity:1;
}
  .album-photos img{
    width:180px;
    border-radius:12px;
}     

.album-photos .mini-photo{
    position:relative;
    overflow:hidden;
    border-radius:12px;
    transition:transform 0.3s ease;
}

.album-photos .mini-photo img{
    width:180px;
    border-radius:12px;
    display:block;
    transition:transform 0.3s ease;
}

.mini-legende{
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    background:rgba(0,0,0,0.7);
    color:white;
    padding:8px;
    font-size:14px;
    opacity:0;
    transition:opacity 0.3s ease;
}

.mini-photo{
    position:relative;
    overflow:visible;
    transition:transform 0.3s ease;
    cursor:pointer;
}

.mini-photo img{
    width:180px;
    border-radius:12px;
    display:block;
    object-fit:cover;
    transition:transform 0.3s ease;
}

.mini-photo:hover{
    transform: scale(1.35);
    z-index:200;
    box-shadow:0 12px 30px rgba(0,0,0,0.35);
}

.mini-photo:hover img{
    transform:scale(1.08);
}
        
.album-photos{
    overflow:visible;
}
        
.album-photos .mini-photo:hover .mini-legende{
    opacity:1;
}
        
        @media (max-width:768px){

    .galerie img,
    .album summary img{
        width:90vw;
        max-width:320px;
    }

  .photo:hover,
.album:hover{
    transform:none;
}

.photo:active{
    transform: scale(1.15);
    z-index:10;
}

.album:active{
    transform: scale(1.08);
    z-index:20;
}

    .album-photos{
        position:static;
        transform:none;
        margin-top:15px;
    }

    .album-photos img{
        width:120px;
    }

.photo,
.album{
    -webkit-tap-highlight-color: transparent;
}

.photo.zoom-mobile,
.album.zoom-mobile{
    transform: scale(1.15);
    z-index:100;
    position:relative;
}
            
}
</style>
</head>

<body>

<h1>🍪 Les Biscuits de Papa Ours 🐻</h1>

<p>Bienvenue dans ma biscuiterie artisanale.</p>

<div class="galerie">

    <div class="photo">
        <img src="images/IMG_0009.JPEG">
        <div class="legende">Cookie Chocolat Fleur de Sel</div>
    </div>

    <div class="photo">
        <img src="images/IMG_0010.JPEG">
        <div class="legende">Cookie Spéculoos</div>
    </div>

    <div class="photo">
        <img src="images/IMG_0011.JPEG">
        <div class="legende">Muffin Praliné Noisette</div>
    </div>

<details class="album">
    <summary>
        <img src="images/IMG_0009.JPEG" alt="Cookies">
        <span class="legende">Cookies — voir plus</span>
    </summary>

   <div class="album-photos">

    <div class="mini-photo">
        <img src="images/IMG_0009.JPEG">
        <div class="mini-legende">Cookie Fleur de Sel</div>
    </div>

    <div class="mini-photo">
        <img src="images/IMG_0010.JPEG">
        <div class="mini-legende">Cookie Spéculoos</div>
    </div>

    <div class="mini-photo">
        <img src="images/IMG_0011.JPEG">
        <div class="mini-legende">Muffin Praliné Noisette</div>
    </div>

</div>
    
</details>

<!--
    Pour créer un nouvel album : 
    <details class="album">
    <summary>
        <img src="images/photo-principale.JPEG">
        <span class="legende">Nom de l’album</span>
    </summary>

    <div class="album-photos">

        <div class="mini-photo">
            <img src="images/photo1.JPEG">
            <div class="mini-legende">Texte</div>
        </div>

    </div>
</details>
-->
    
</div>
<script>
document.querySelectorAll('.photo, .album').forEach(function(element){
    element.addEventListener('click', function(){
        element.classList.toggle('zoom-mobile');
    });
});
</script>
   
    

</body>
</html>
