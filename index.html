<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Les Biscuits de Papa Ours</title>

<style>
body{
    font-family: "Comic Sans MS", cursive;
    background:#f5f1ea;
    margin:0;
    padding:40px;
    text-align:center;
}

h1{
    color:#5c3b1e;
}

.galerie{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    margin-top:40px;
}

.galerie img{
    width:300px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
    transition: transform 0.3s ease;
}

.photo img{
    transition: transform 0.3s ease;
}

.photo:hover{
    transform: scale(1.18);
    z-index:10;
}

.photo{
    position:relative;
    border-radius:15px;
    cursor:pointer;
    transition: transform 0.4s ease;
}

.legende{
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    background:rgba(0,0,0,0.7);
    color:white;
    padding:10px;
    opacity:0;
    transition:opacity 0.3s ease;
    font-size:18px;
}

.photo:hover .legende{
    opacity:1;
}

</style>
</head>

<body>

<h1>🍪 Les Biscuits de Papa Ours 🐻</h1>

<p>Bienvenue dans ma biscuiterie artisanale.</p>

<div class="galerie">

    <div class="photo">
        <img src="images/IMG_0009.JPEG">
        <div class="legende">Cookie Chocolat Fleur de Sel</div>
    </div>

    <div class="photo">
        <img src="images/IMG_0010.JPEG">
        <div class="legende">Cookie Spéculoos</div>
    </div>

    <div class="photo">
        <img src="images/IMG_0011.JPEG">
        <div class="legende">Muffin Praliné Noisette</div>
    </div>

</div>


</body>
</html>
