<h2>📝 Demande de devis</h2>

<form action="https://formsubmit.co/TON_EMAIL" method="POST" class="formulaire">

    <input type="text"
           name="Nom"
           placeholder="Nom"
           required>

    <input type="text"
           name="Prénom"
           placeholder="Prénom"
           required>

    <input type="tel"
           name="Téléphone"
           placeholder="Numéro de téléphone"
           required>

    <input type="email"
           name="Email"
           placeholder="Adresse e-mail"
           required>

    <select id="categorie"
            name="Catégorie"
            required>

        <option value="">Choisir une catégorie</option>

        <option value="Cookies">Cookies</option>
        <option value="Sablés">Sablés</option>
        <option value="Shortbread">Shortbread</option>

    </select>

    <select id="produit"
            name="Produit"
            required
            style="display:none;">

        <option value="">
            Choisir un produit
        </option>

    </select>

    <input id="quantite"
           type="number"
           name="Quantité"
           min="1"
           placeholder="Nombre souhaité"
           required
           style="display:none;">

    <button type="submit">
        📨 Envoyer la demande
    </button>

</form>
