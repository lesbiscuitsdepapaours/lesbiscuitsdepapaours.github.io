<h2>📝 Demande de devis</h2>

<form action="https://formsubmit.co/lesbiscuitsdepapaours@gmail.com" method="POST" class="formulaire">

    <input type="text" name="Nom" placeholder="Nom" required>

    <input type="text" name="Prénom" placeholder="Prénom" required>

    <input type="tel" name="Téléphone" placeholder="Numéro de téléphone" required>

    <input type="email" name="Email" placeholder="Adresse e-mail" required>

    <div id="lignes-commande">

        <div class="ligne-produit">

            <select name="Catégorie 1" class="categorie-produit" required>
                <option value="">Choisir une catégorie</option>
                <option value="Cookies">Cookies</option>
                <option value="Sablés">Sablés</option>
                <option value="Shortbread">Shortbread</option>
            </select>

            <select name="Produit 1" class="produit-select" required>
                <option value="">Choisir un produit</option>
            </select>

            <input type="number"
                   name="Quantité 1"
                   min="1"
                   placeholder="Quantité"
                   required>

        </div>

    </div>

    <button type="button" id="ajouter-produit" class="ajouter-btn">
        ➕ Ajouter un autre produit
    </button>

    <button type="submit">
        📨 Envoyer la demande
    </button>

</form>

<style>
.formulaire
{
    max-width:650px;
    margin:30px auto;
    display:flex;
    flex-direction:column;
    gap:15px;
}

.formulaire input,
.formulaire select
{
    padding:14px;
    border:none;
    border-radius:12px;
    font-family:'Fredoka', sans-serif;
    font-size:16px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    box-sizing:border-box;
}

.ligne-produit
{
    display:flex;
    flex-direction:column;
    gap:12px;
    margin-bottom:18px;
    padding:18px;
    background:rgba(255,255,255,0.55);
    border-radius:16px;
}

.formulaire button
{
    background:#6b3f1d;
    color:white;
    border:none;
    border-radius:14px;
    padding:14px;
    font-size:18px;
    cursor:pointer;
    transition:
    transform 0.25s ease,
    box-shadow 0.25s ease;
}

.formulaire button:hover
{
    transform:translateY(-2px);
    box-shadow:0 8px 18px rgba(0,0,0,0.2);
}

.ajouter-btn
{
    background:#8a5a2b;
}
</style>

<script>
const produits =
{
    "Cookies":
    [
        "Cookie Bounty",
        "Cookie Sirop d'érable & noix de pécan",
        "Cookie aux chips",
        "Cookie au beurre de cacahuète",
        "Cookie Oréo",
        "Cookies chocolat & café",
        "Cookies chocolat noir & fleur de sel",
        "Cookies Spéculoos"
    ],

    "Sablés":
    [
        "Sablés XXL à l'anis",
        "Sablés fleur d'oranger & amandes",
        "Sablés zeste de citron",
        "Sablés chocolat & Earl Grey",
        "Sablés noisette",
        "Sablés au café",
        "Sablés au Comté"
    ],

    "Shortbread":
    [
        "Shortbread nature",
        "Shortbread chocolat",
        "Shortbread caramel",
        "Shortbread lavande"
    ]
};

let numeroLigne = 1;

function activerLigne(ligne)
{
    const categorie = ligne.querySelector(".categorie-produit");
    const produit = ligne.querySelector(".produit-select");

    categorie.addEventListener("change", function()
    {
        produit.innerHTML = '<option value="">Choisir un produit</option>';

        if(this.value === "")
        {
            return;
        }

        produits[this.value].forEach(function(nomProduit)
        {
            const option = document.createElement("option");
            option.value = nomProduit;
            option.textContent = nomProduit;
            produit.appendChild(option);
        });
    });
}

document.querySelectorAll(".ligne-produit").forEach(activerLigne);

document.getElementById("ajouter-produit").addEventListener("click", function()
{
    numeroLigne++;

    const nouvelleLigne = document.createElement("div");
    nouvelleLigne.className = "ligne-produit";

    nouvelleLigne.innerHTML = `
        <select name="Catégorie ${numeroLigne}" class="categorie-produit" required>
            <option value="">Choisir une catégorie</option>
            <option value="Cookies">Cookies</option>
            <option value="Sablés">Sablés</option>
            <option value="Shortbread">Shortbread</option>
        </select>

        <select name="Produit ${numeroLigne}" class="produit-select" required>
            <option value="">Choisir un produit</option>
        </select>

        <input type="number"
               name="Quantité ${numeroLigne}"
               min="1"
               placeholder="Quantité"
               required>
    `;

    document.getElementById("lignes-commande").appendChild(nouvelleLigne);

    activerLigne(nouvelleLigne);
});
</script>
